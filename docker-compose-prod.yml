services:
  db:
    image: postgres:15
    container_name: pmro_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-pmro_requerimentos}
      POSTGRES_USER: ${POSTGRES_USER:-pmro_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?defina POSTGRES_PASSWORD no .env}
      TZ: America/Porto_Velho
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-pmro_user} -d ${POSTGRES_DB:-pmro_requerimentos}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: pmro_backend
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    networks:
      - internal
      - web

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-/api/v1}
    container_name: pmro_frontend
    restart: unless-stopped
    depends_on:
      - backend
    networks:
      - web

  reverse-proxy:
    image: traefik:v3.3
    container_name: pmro_traefik
    restart: unless-stopped
    environment:
      # Usado para renderizar o template do file provider no start do Traefik.
      DOMAIN: ${DOMAIN:?defina DOMAIN no .env}
      # Token Cloudflare do desafio DNS-01 (permissões Zone:DNS:Edit + Zone:Read).
      CF_DNS_API_TOKEN: ${CF_DNS_API_TOKEN:?defina CF_DNS_API_TOKEN no .env}
    entrypoint:
      - /bin/sh
      - /usr/local/bin/render-and-run.sh
    command:
      # File provider (sem acesso ao socket do Docker): evita o problema de
      # negociação de versão da API do Docker em daemons recentes.
      - "--providers.file.directory=/tmp/traefik-dynamic"
      - "--providers.file.watch=true"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      - "--certificatesresolvers.letsencrypt.acme.email=${ACME_EMAIL:?defina ACME_EMAIL no .env}"
      - "--certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json"
      # CA de STAGING durante a validação (limites altos, certificado não-confiável).
      # Após validar o fluxo, comente esta linha para usar a produção.
      - "--certificatesresolvers.letsencrypt.acme.caserver=https://acme-staging-v02.api.letsencrypt.org/directory"
      # Desafio DNS-01 via Cloudflare: não usa portas de entrada (ideal para a
      # VPS atrás de NAT). O Traefik cria o TXT _acme-challenge pela API.
      - "--certificatesresolvers.letsencrypt.acme.dnschallenge=true"
      - "--certificatesresolvers.letsencrypt.acme.dnschallenge.provider=cloudflare"
      - "--certificatesresolvers.letsencrypt.acme.dnschallenge.resolvers=1.1.1.1:53,8.8.8.8:53"
      - "--log.level=INFO"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./letsencrypt:/letsencrypt
      - ./traefik/dynamic:/etc/traefik/templates:ro
      - ./traefik/render-and-run.sh:/usr/local/bin/render-and-run.sh:ro
    networks:
      - web

volumes:
  postgres_data:
    driver: local

networks:
  web:
    name: pmro_web
    driver: bridge
  internal:
    name: pmro_internal
    driver: bridge
