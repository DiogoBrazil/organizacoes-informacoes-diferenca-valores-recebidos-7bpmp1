services:
  db:
    image: postgres:15
    container_name: pmro_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-pmro_requerimentos}
      POSTGRES_USER: ${POSTGRES_USER:-pmro_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?defina POSTGRES_PASSWORD no .env}
      TZ: America/Porto_Velho
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-pmro_user} -d ${POSTGRES_DB:-pmro_requerimentos}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: pmro_backend
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    networks:
      - internal
      - web

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-/api/v1}
    container_name: pmro_frontend
    restart: unless-stopped
    depends_on:
      - backend
    networks:
      - web

  reverse-proxy:
    image: traefik:v3.3
    container_name: pmro_traefik
    restart: unless-stopped
    environment:
      # Usado pelo template do file provider (traefik/dynamic/routers.yml).
      DOMAIN: ${DOMAIN:?defina DOMAIN no .env}
    command:
      # File provider (sem acesso ao socket do Docker): evita o problema de
      # negociação de versão da API do Docker em daemons recentes.
      - "--providers.file.directory=/etc/traefik/dynamic"
      - "--providers.file.watch=true"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      - "--certificatesresolvers.letsencrypt.acme.email=${ACME_EMAIL:?defina ACME_EMAIL no .env}"
      - "--certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json"
      - "--certificatesresolvers.letsencrypt.acme.httpchallenge=true"
      - "--certificatesresolvers.letsencrypt.acme.httpchallenge.entrypoint=web"
      - "--entrypoints.web.http.redirections.entryPoint.to=websecure"
      - "--entrypoints.web.http.redirections.entryPoint.scheme=https"
      - "--log.level=INFO"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./letsencrypt:/letsencrypt
      - ./traefik/dynamic:/etc/traefik/dynamic:ro
    networks:
      - web

volumes:
  postgres_data:
    driver: local

networks:
  web:
    name: pmro_web
    driver: bridge
  internal:
    name: pmro_internal
    driver: bridge
